// ── DATE HELPERS ─────────────────────────────────────────────────────────────

function parseDate(d) { return d ? new Date(d + 'T12:00:00') : null; }
function fmtDate(d) { return d ? parseDate(d).toLocaleDateString('fr-CA') : ''; }
function fmtDateLong(d) {
  return d ? parseDate(d).toLocaleDateString('fr-CA',{weekday:'long',year:'numeric',month:'long',day:'numeric'}) : '';
}
function todayISO() { return new Date().toISOString().slice(0,10); }
function daysFromNow(n) {
  const dt = new Date(); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10);
}

// ── HOOKS ──────────────────────────────────────────────────────────────────

function useLS(key, fallback) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : fallback; } catch { return fallback; }
  });
  const set = useCallback(v => {
    setVal(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [val, set];
}

// ── INLINE EDIT COMPONENTS ───────────────────────────────────────────────────

function InlineEdit({ value, onChange, multiline, placeholder, className, inputClassName }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value || '');
  const ref = useRef(null);

  function open() { setDraft(value || ''); setEditing(true); }
  function commit() { setEditing(false); if ((draft || '') !== (value || '')) onChange(draft); }
  function cancel() { setEditing(false); setDraft(value || ''); }

  useEffect(() => { if (editing && ref.current) { ref.current.focus(); ref.current.select && ref.current.select(); } }, [editing]);

  if (editing) {
    if (multiline) {
      return (
        <textarea ref={ref} value={draft} rows={4}
          onChange={e=>setDraft(e.target.value)}
          onBlur={commit}
          onKeyDown={e=>{ if(e.key==='Escape'){e.preventDefault();cancel();} }}
          className={inputClassName || "w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400 resize-y"} />
      );
    }
    return (
      <input ref={ref} type="text" value={draft}
        onChange={e=>setDraft(e.target.value)}
        onBlur={commit}
        onKeyDown={e=>{ if(e.key==='Enter'){e.preventDefault();commit();} if(e.key==='Escape'){e.preventDefault();cancel();} }}
        className={inputClassName || "w-full border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400"} />
    );
  }
  const empty = !value;
  return (
    <div onClick={open}
      className={(className || "") + " cursor-text rounded px-1 -mx-1 hover:bg-gray-100 transition-colors " + (multiline ? "whitespace-pre-wrap min-h-[1.5rem]" : "") + (empty ? " text-gray-400 italic" : "")}
      title="Cliquer pour modifier">
      {value || placeholder || 'Cliquer pour ajouter…'}
    </div>
  );
}

function InlineDate({ value, onChange, className }) {
  const [editing, setEditing] = useState(false);
  const ref = useRef(null);
  useEffect(() => { if (editing && ref.current) ref.current.focus(); }, [editing]);

  if (editing) {
    return (
      <input ref={ref} type="date" value={value || ''}
        onChange={e=>{ onChange(e.target.value); }}
        onBlur={()=>setEditing(false)}
        onKeyDown={e=>{ if(e.key==='Enter'||e.key==='Escape') setEditing(false); }}
        className="border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400" />
    );
  }
  return (
    <span className={"inline-flex items-center gap-1 " + (className || "")}>
      <span onClick={()=>setEditing(true)} className="cursor-pointer hover:text-blue-600">
        {value ? fmtDate(value) : <span className="text-gray-400 italic">Choisir une date</span>}
      </span>
      {value && (
        <button onClick={()=>onChange('')} className="text-gray-300 hover:text-red-500" title="Effacer">×</button>
      )}
    </span>
  );
}

function InlineSelect({ value, options, onChange, render }) {
  const [open, setOpen] = useState(false);
  const cur = options.find(o=>o.id===value) || options[0];
  return (
    <span className="relative inline-block">
      <button onClick={()=>setOpen(o=>!o)}>
        {render ? render(cur) : (
          <span className="text-xs px-2.5 py-1 rounded-full font-medium text-white" style={{backgroundColor:cur.color||'#6b7280'}}>{cur.label}</span>
        )}
      </button>
      {open && (
        <>
          <div className="fixed inset-0 z-10" onClick={()=>setOpen(false)} />
          <div className="absolute z-20 mt-1 bg-white border border-gray-200 rounded-lg shadow-lg py-1 min-w-[160px]">
            {options.map(o=>(
              <button key={o.id} onClick={()=>{ onChange(o.id); setOpen(false); }}
                className="w-full text-left px-3 py-1.5 text-sm hover:bg-gray-100 flex items-center gap-2">
                {o.color && <span className="w-2.5 h-2.5 rounded-full" style={{backgroundColor:o.color}} />}
                {o.label}
              </button>
            ))}
          </div>
        </>
      )}
    </span>
  );
}

// ── TAG + SUBTASK INPUTS ─────────────────────────────────────────────────────

function TagInput({ tags, onChange }) {
  const [draft, setDraft] = useState('');
  function add(v) {
    const tag = v.trim();
    if (tag && !tags.includes(tag)) onChange([...tags, tag]);
    setDraft('');
  }
  function key(e) {
    if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); add(draft); }
    else if (e.key === 'Backspace' && !draft && tags.length) onChange(tags.slice(0,-1));
  }
  return (
    <div className="flex flex-wrap gap-1.5 border border-gray-300 rounded-lg px-2 py-1.5 focus-within:ring-2 focus-within:ring-gray-400">
      {tags.map(t=>(
        <span key={t} className="inline-flex items-center gap-1 text-xs bg-gray-100 text-gray-700 rounded-full px-2 py-0.5">
          {t}
          <button type="button" onClick={()=>onChange(tags.filter(x=>x!==t))} className="text-gray-400 hover:text-red-500">×</button>
        </span>
      ))}
      <input type="text" value={draft} onChange={e=>setDraft(e.target.value)} onKeyDown={key}
        onBlur={()=>add(draft)}
        className="flex-1 min-w-[100px] text-sm focus:outline-none border-0 p-0" placeholder="Ajouter un tag (Entrée)…" />
    </div>
  );
}

function SubtaskList({ items, onChange }) {
  const [draft, setDraft] = useState('');
  function add() {
    const titre = draft.trim();
    if (!titre) return;
    onChange([...items, { id:uid(), titre, fait:false }]);
    setDraft('');
  }
  function toggle(id) { onChange(items.map(s=>s.id===id?{...s,fait:!s.fait}:s)); }
  function remove(id) { onChange(items.filter(s=>s.id!==id)); }
  const done = items.filter(s=>s.fait).length;
  return (
    <div className="space-y-1.5">
      {items.length>0 && <p className="text-xs text-gray-400">{done}/{items.length} complétées</p>}
      {items.map(s=>(
        <div key={s.id} className="flex items-center gap-2 text-sm">
          <input type="checkbox" checked={s.fait} onChange={()=>toggle(s.id)} className="rounded" />
          <span className={"flex-1 " + (s.fait?'line-through text-gray-400':'text-gray-700')}>{s.titre}</span>
          <button type="button" onClick={()=>remove(s.id)} className="text-gray-300 hover:text-red-500">×</button>
        </div>
      ))}
      <div className="flex gap-2">
        <input type="text" value={draft} onChange={e=>setDraft(e.target.value)}
          onKeyDown={e=>{ if(e.key==='Enter'){e.preventDefault();add();} }}
          className="flex-1 border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-gray-400"
          placeholder="Nouvelle sous-tâche (Entrée)…" />
        <button type="button" onClick={add} className="text-xs px-2.5 py-1 bg-gray-100 rounded hover:bg-gray-200 text-gray-600">+</button>
      </div>
    </div>
  );
}

function Bar({ value, max, color }) {
  const pct = max > 0 ? Math.min((value / max) * 100, 100) : 0;
  const barColor = pct >= 100 ? '#ef4444' : pct >= 80 ? '#f97316' : color;
  return (
    <div className="h-2 bg-gray-200 rounded-full overflow-hidden">
      <div className="h-full rounded-full transition-all" style={{ width:`${pct}%`, backgroundColor:barColor }} />
    </div>
  );
}

function DonutChart({ segments, size=160, stroke=22 }) {
  const radius = (size - stroke) / 2;
  const C = 2 * Math.PI * radius;
  const total = segments.reduce((s,x)=>s+x.value,0) || 1;
  let acc = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform:'rotate(-90deg)' }}>
      <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="#e5e7eb" strokeWidth={stroke} />
      {segments.map((seg,i)=>{
        const len = (seg.value/total) * C;
        const el = (
          <circle key={i} cx={size/2} cy={size/2} r={radius} fill="none"
            stroke={seg.color} strokeWidth={stroke}
            strokeDasharray={`${len} ${C}`} strokeDashoffset={-acc} />
        );
        acc += len;
        return el;
      })}
    </svg>
  );
}

function Modal({ open, onClose, title, size="md", children }) {
  useEffect(() => {
    if (open) document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, [open]);
  if (!open) return null;
  const w = { sm:"max-w-md", md:"max-w-xl", lg:"max-w-2xl" }[size];
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
      <div className="absolute inset-0 bg-black/50" onClick={onClose} />
      <div className={`relative bg-white rounded-xl shadow-2xl w-full ${w} max-h-[92vh] flex flex-col`}>
        <div className="flex items-center justify-between px-6 py-4 border-b flex-shrink-0">
          <h2 className="text-base font-semibold text-gray-900">{title}</h2>
          <button onClick={onClose} className="p-1 hover:bg-gray-100 rounded-lg text-gray-400 hover:text-gray-600">
            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div className="overflow-y-auto p-6 flex-1">{children}</div>
      </div>
    </div>
  );
}

function EventManager({ evenements, onSave, onClose }) {
  const [list, setList] = useState(
    [...evenements].sort((a,b)=>(a.ordre??0)-(b.ordre??0)).map(e=>({...e}))
  );
  const [warn, setWarn] = useState(null);
  const [showNew, setShowNew] = useState(false);
  const [nf, setNf] = useState({ label:'', color:'#6366f1', budgetHeures:'10' });

  function toggle(id) {
    const evt = list.find(e=>e.id===id);
    if (evt && !evt.actif && id === 'tianguis') { setWarn(id); return; }
    setList(l => l.map(e => e.id===id ? {...e, actif:!e.actif} : e));
  }

  function confirmWarn() {
    setList(l => l.map(e => e.id===warn ? {...e, actif:true} : e));
    setWarn(null);
  }

  function setBudget(id, v) {
    setList(l => l.map(e => e.id===id ? {...e, budgetHeures:parseFloat(v)||0} : e));
  }

  function move(idx, dir) {
    setList(l => {
      const arr = [...l];
      const j = idx + dir;
      if (j < 0 || j >= arr.length) return arr;
      [arr[idx], arr[j]] = [arr[j], arr[idx]];
      return arr.map((e,i)=>({...e, ordre:i}));
    });
  }

  function addEvent() {
    if (!nf.label.trim()) return;
    setList(l => [...l, { id:uid(), label:nf.label.trim(), color:nf.color, budgetHeures:parseFloat(nf.budgetHeures)||0,
      actif:true, ordre:l.length, lieu:'', description:'', notes:'', statutProjet:'planification', responsables:[], datesEvenement:[] }]);
    setNf({ label:'', color:'#6366f1', budgetHeures:'10' });
    setShowNew(false);
  }

  function save() {
    onSave(list.map((e,i)=>({...e, ordre:i})));
  }

  return (
    <div className="space-y-3">
      {warn && (
        <div className="bg-amber-50 border border-amber-300 rounded-lg p-3">
          <p className="text-sm text-amber-800 font-medium">⚠️ Ce projet est suspendu. Réactiver ?</p>
          <div className="flex gap-2 mt-2">
            <button onClick={confirmWarn} className="text-xs px-3 py-1.5 bg-amber-600 text-white rounded-lg hover:bg-amber-700">Réactiver</button>
            <button onClick={()=>setWarn(null)} className="text-xs px-3 py-1.5 border border-gray-300 rounded-lg hover:bg-gray-50">Annuler</button>
          </div>
        </div>
      )}

      {list.map((evt,idx) => (
        <div key={evt.id} className={`flex items-center gap-3 p-3 rounded-lg border ${evt.actif?'bg-white border-gray-200':'bg-gray-50 border-gray-200 opacity-60'}`}>
          <div className="flex flex-col">
            <button onClick={()=>move(idx,-1)} disabled={idx===0} className="text-gray-400 hover:text-gray-700 disabled:opacity-30 leading-none">▲</button>
            <button onClick={()=>move(idx,1)} disabled={idx===list.length-1} className="text-gray-400 hover:text-gray-700 disabled:opacity-30 leading-none">▼</button>
          </div>
          <div className="w-3.5 h-3.5 rounded-full flex-shrink-0" style={{backgroundColor:evt.color}} />
          <span className="flex-1 text-sm font-medium text-gray-800 truncate">{evt.label}</span>
          <div className="flex items-center gap-1">
            <input type="number" min="0" value={evt.budgetHeures}
              onChange={e=>setBudget(evt.id,e.target.value)}
              className="w-16 border border-gray-300 rounded px-2 py-1 text-xs text-right focus:outline-none focus:ring-1 focus:ring-gray-400" />
            <span className="text-xs text-gray-400">h</span>
          </div>
          <button onClick={()=>toggle(evt.id)}
            className={`text-xs px-2.5 py-1 rounded-full font-medium transition-colors ${evt.actif?'bg-green-100 text-green-700 hover:bg-red-100 hover:text-red-700':'bg-gray-200 text-gray-500 hover:bg-green-100 hover:text-green-700'}`}>
            {evt.actif?'Actif':'Inactif'}
          </button>
        </div>
      ))}

      {showNew ? (
        <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg space-y-2">
          <p className="text-xs font-semibold text-blue-800">Nouvel événement</p>
          <input type="text" value={nf.label} onChange={e=>setNf(p=>({...p,label:e.target.value}))}
            className="w-full border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400"
            placeholder="Nom de l'événement" />
          <div className="flex items-center gap-4">
            <div className="flex items-center gap-2">
              <input type="color" value={nf.color} onChange={e=>setNf(p=>({...p,color:e.target.value}))}
                className="w-8 h-8 rounded cursor-pointer border-0" />
              <span className="text-xs text-gray-600">Couleur</span>
            </div>
            <div className="flex items-center gap-2">
              <input type="number" min="0" value={nf.budgetHeures}
                onChange={e=>setNf(p=>({...p,budgetHeures:e.target.value}))}
                className="w-20 border border-gray-300 rounded px-2 py-1.5 text-sm focus:outline-none" />
              <span className="text-xs text-gray-600">heures</span>
            </div>
          </div>
          <div className="flex gap-2">
            <button onClick={addEvent} className="text-xs px-3 py-1.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Créer</button>
            <button onClick={()=>setShowNew(false)} className="text-xs px-3 py-1.5 border border-gray-300 rounded-lg hover:bg-gray-50">Annuler</button>
          </div>
        </div>
      ) : (
        <button onClick={()=>setShowNew(true)}
          className="w-full border-2 border-dashed border-gray-300 rounded-lg py-2 text-sm text-gray-400 hover:border-blue-400 hover:text-blue-500 transition-colors">
          + Nouvel événement
        </button>
      )}

      <div className="flex justify-end gap-2 pt-2 border-t">
        <button onClick={onClose} className="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50">Annuler</button>
        <button onClick={save} className="px-4 py-2 text-sm bg-gray-900 text-white rounded-lg hover:bg-gray-700">Sauvegarder</button>
      </div>
    </div>
  );
}

function EventSheet({ evenement, taches, onUpdateEvent, onEditTask, onAddTask }) {
  const [copied, setCopied] = useState(false);
  const evt = evenement;
  const et = taches.filter(t=>t.evenementId===evt.id);

  const stats = {
    total: et.length,
    todo: et.filter(t=>t.statut==='todo').length,
    en_cours: et.filter(t=>t.statut==='en_cours').length,
    termine: et.filter(t=>t.statut==='termine').length,
    heuresReelles: et.filter(t=>t.statut==='termine').reduce((s,t)=>s+(t.heuresReelles||0),0),
  };

  function patch(k, v) { onUpdateEvent({ ...evt, [k]:v }); }

  function addDate() {
    patch('datesEvenement', [...(evt.datesEvenement||[]), { id:uid(), label:'Nouvelle date', date:'' }]);
  }
  function updDate(id, k, v) {
    patch('datesEvenement', (evt.datesEvenement||[]).map(d=>d.id===id?{...d,[k]:v}:d));
  }
  function rmDate(id) {
    patch('datesEvenement', (evt.datesEvenement||[]).filter(d=>d.id!==id));
  }

  const sp = STATUTS_PROJET.find(s=>s.id===evt.statutProjet) || STATUTS_PROJET[0];

  function copyRecap() {
    const lines = [];
    lines.push(`# ${evt.label}`);
    lines.push(`Statut : ${sp.label}`);
    if (evt.lieu) lines.push(`Lieu : ${evt.lieu}`);
    if (evt.responsables?.length) lines.push(`Responsables : ${evt.responsables.join(', ')}`);
    if (evt.description) lines.push(`\n${evt.description}`);
    if ((evt.datesEvenement||[]).length) {
      lines.push(`\n## Dates clés`);
      evt.datesEvenement.forEach(d=> lines.push(`- ${d.label}${d.date?` : ${fmtDate(d.date)}`:''}`));
    }
    lines.push(`\n## Tâches (${stats.termine}/${stats.total})`);
    et.forEach(t=> lines.push(`- [${t.statut==='termine'?'x':' '}] ${t.titre}`));
    const text = lines.join('\n');
    navigator.clipboard.writeText(text).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); });
  }

  function evtColor() { return evt.color; }

  return (
    <div className="p-6 space-y-6 max-w-4xl mx-auto">
      {/* Colored header band */}
      <div className="rounded-xl p-5 text-white" style={{backgroundColor:evt.color}}>

          <div className="flex-1 min-w-0">
            <div className="text-2xl font-bold">
              <InlineEdit value={evt.label} onChange={v=>patch('label',v)}
                className="text-white" inputClassName="w-full bg-white/20 text-white rounded px-2 py-1 text-2xl font-bold focus:outline-none" />
            </div>
            <p className="text-sm opacity-90 mt-1">
              <InlineEdit value={evt.lieu} onChange={v=>patch('lieu',v)} placeholder="Lieu…"
                className="text-white" inputClassName="bg-white/20 text-white rounded px-2 py-0.5 text-sm focus:outline-none" />
            </p>
          </div>
          <div className="flex items-center gap-3">
            <InlineSelect value={evt.statutProjet} options={STATUTS_PROJET} onChange={v=>patch('statutProjet',v)} />
            <input type="color" value={evt.color} onChange={e=>patch('color',e.target.value)}
              className="w-9 h-9 rounded cursor-pointer border-0 bg-transparent" title="Couleur" />
          </div>
        </div>
      </div>

      {/* Stats row */}

          <p className="text-xl font-bold text-gray-900">{stats.heuresReelles}<span className="text-sm text-gray-400">/{evt.budgetHeures}h</span></p>

        <div className="bg-white rounded-xl border border-gray-200 p-3">
          <p className="text-xs text-gray-500">En cours</p>
          <p className="text-xl font-bold text-blue-700">{stats.en_cours}</p>

        <div className="bg-white rounded-xl border border-gray-200 p-3">

        {/* Description */}
        <div className="bg-white rounded-xl border border-gray-200 p-5">
          <h3 className="text-sm font-semibold text-gray-700 mb-2">Contexte / description</h3>

          <div className="text-sm text-gray-700">
            <InlineEdit value={evt.notes} onChange={v=>patch('notes',v)} multiline placeholder="Notes internes…" />
          </div>

      </div>

      <div className="grid md:grid-cols-2 gap-5">
        {/* Responsables */}

          <h3 className="text-sm font-semibold text-gray-700 mb-2">Responsables</h3>
          <TagInput tags={evt.responsables||[]} onChange={v=>patch('responsables',v)} />
        </div>
        {/* Budget */}
        <div className="bg-white rounded-xl border border-gray-200 p-5">
          <h3 className="text-sm font-semibold text-gray-700 mb-2">Budget heures</h3>

            <input type="number" min="0" value={evt.budgetHeures}

              className="w-24 border border-gray-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-gray-400" />
            <span className="text-sm text-gray-500">heures allouées</span>
          </div>
          <div className="mt-3"><Bar value={stats.heuresReelles} max={evt.budgetHeures} color={evt.color} /></div>
        </div>
      </div>

      {/* Dates clés */}
      <div className="bg-white rounded-xl border border-gray-200 p-5">
        <div className="flex items-center justify-between mb-3">
          <h3 className="text-sm font-semibold text-gray-700">Dates clés</h3>

        </div>
        <div className="space-y-2">
          {(evt.datesEvenement||[]).length===0 && <p className="text-xs text-gray-400 italic">Aucune date enregistrée.</p>}

              <div className="flex-1">

// ── DASHBOARD VIEW ─────────────────────────────────────────────────────────

function DashboardView({ evenements, taches, onEditTask, onAddTask, onManageEvents }) {
  const [fEvt, setFEvt] = useState('all');
  const [fCat, setFCat] = useState('all');

  const active = evenements.filter(e=>e.actif);

  const globalStats = useMemo(() => {
    const pool = taches.filter(t => evenements.find(e=>e.id===t.evenementId)?.actif);
    return {
      total:    pool.length,
      todo:     pool.filter(t=>t.statut==='todo').length,
      en_cours: pool.filter(t=>t.statut==='en_cours').length,
      termine:  pool.filter(t=>t.statut==='termine').length,
    };
  }, [taches, evenements]);

  const eventStats = useMemo(() => active.map(evt => {
    const et = taches.filter(t=>t.evenementId===evt.id);
    return {
      ...evt,
      total:    et.length,
      todo:     et.filter(t=>t.statut==='todo').length,
      en_cours: et.filter(t=>t.statut==='en_cours').length,
      termine:  et.filter(t=>t.statut==='termine').length,
      heuresReelles:  et.filter(t=>t.statut==='termine').reduce((s,t)=>s+(t.heuresReelles||0),0),
      heuresEstimees: et.reduce((s,t)=>s+(t.heuresEstimees||0),0),
    };
  }), [active, taches]);

  // Velocity: tasks completed in last 7 days
  const weekAgo = daysFromNow(-7);
  const velocity = useMemo(() => taches.filter(t=>
    t.statut==='termine' && t.dateValidation && t.dateValidation >= weekAgo
  ).length, [taches]);

  // This week: tasks due in next 7 days, not terminated
  const next7 = daysFromNow(7);
  const today = todayISO();
  const thisWeek = useMemo(() => taches.filter(t=>{
    const evt = evenements.find(e=>e.id===t.evenementId);
    if (!evt?.actif) return false;
    return t.dateLimite && t.statut!=='termine' && t.dateLimite >= today && t.dateLimite <= next7;
  }).sort((a,b)=>a.dateLimite.localeCompare(b.dateLimite)), [taches, evenements]);

  const nextEvt = useMemo(() => {
    return active
      .filter(e=>e.dateProchaine && e.dateProchaine >= today)
      .sort((a,b)=>a.dateProchaine.localeCompare(b.dateProchaine))[0] || null;
  }, [active]);

  const filteredTaches = useMemo(() => taches.filter(t => {
    const evt = evenements.find(e=>e.id===t.evenementId);
    if (!evt?.actif) return false;
    if (fEvt !== 'all' && t.evenementId !== fEvt) return false;
    if (fCat !== 'all' && t.categorie !== fCat) return false;
    return true;
  }), [taches, evenements, fEvt, fCat]);

  const upcoming = filteredTaches.filter(t=>t.dateLimite && t.statut!=='termine')
    .sort((a,b)=>a.dateLimite.localeCompare(b.dateLimite)).slice(0,5);
  const enCours  = filteredTaches.filter(t=>t.statut==='en_cours');
  const todos    = filteredTaches.filter(t=>t.statut==='todo');

  const donutSegments = [
    { label:STATUTS[0].label, value:globalStats.todo,     color:STATUT_COLORS.todo },
    { label:STATUTS[1].label, value:globalStats.en_cours, color:STATUT_COLORS.en_cours },
    { label:STATUTS[2].label, value:globalStats.termine,  color:STATUT_COLORS.termine },
  ];

  function evtColor(id) { return evenements.find(e=>e.id===id)?.color||'#888'; }
  function evtShort(id) {
    const lbl = evenements.find(e=>e.id===id)?.label||id;
    return lbl.split(' ').slice(-1)[0];
  }

  return (
    <div className="p-6 space-y-6 max-w-5xl mx-auto">
      <div className="flex items-start justify-between">
        <div>
          <h1 className="text-2xl font-bold text-gray-900">Tableau de bord</h1>
          <p className="text-sm text-gray-500 mt-0.5">Les Survenants — Gestion de projet 2026</p>
        </div>
        <button onClick={onManageEvents}
          className="flex items-center gap-2 px-3 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 text-gray-600">
          <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          Gérer les événements
        </button>
      </div>

      {nextEvt && (
        <div className="rounded-xl p-4 text-white flex items-center gap-4" style={{backgroundColor:nextEvt.color}}>
          <div className="text-2xl">📅</div>
          <div>
            <p className="font-semibold">{nextEvt.label}</p>
            <p className="text-sm opacity-90">Prochain événement — {fmtDateLong(nextEvt.dateProchaine)}</p>
          </div>
        </div>
      )}

      {/* Stats + donut + velocity */}
      <div className="grid md:grid-cols-3 gap-4">
        <div className="md:col-span-2 grid grid-cols-2 gap-3">
          {[
            { label:'Total',     val:globalStats.total,    cls:'text-gray-900', border:'border-gray-200' },
            { label:'À faire',   val:globalStats.todo,     cls:'text-gray-700', border:'border-gray-200' },
            { label:'En cours',  val:globalStats.en_cours, cls:'text-blue-700', border:'border-blue-200' },
            { label:'Terminé',   val:globalStats.termine,  cls:'text-green-700',border:'border-green-200' },
          ].map(s=>(
            <div key={s.label} className={`bg-white rounded-xl border ${s.border} p-4`}>
              <p className="text-xs text-gray-500 uppercase tracking-wide font-medium">{s.label}</p>
              <p className={`text-3xl font-bold mt-1 ${s.cls}`}>{s.val}</p>
            </div>
          ))}
          <div className="col-span-2 bg-white rounded-xl border border-gray-200 p-4 flex items-center gap-3">
            <div className="text-2xl">⚡</div>
            <div>
              <p className="text-2xl font-bold text-gray-900">{velocity}</p>
              <p className="text-xs text-gray-500">tâche{velocity!==1?'s':''} terminée{velocity!==1?'s':''} cette semaine</p>
            </div>
          </div>
        </div>
        <div className="bg-white rounded-xl border border-gray-200 p-4">
          <h2 className="text-sm font-semibold text-gray-700 mb-2">Répartition</h2>
          <div className="flex items-center gap-4">
            <DonutChart segments={donutSegments} size={130} />
            <div className="space-y-1.5">
              {donutSegments.map(s=>(
                <div key={s.label} className="flex items-center gap-2 text-xs">
                  <span className="w-2.5 h-2.5 rounded-full" style={{backgroundColor:s.color}} />
                  <span className="text-gray-600">{s.label}</span>
                  <span className="font-semibold text-gray-800 ml-auto">{s.value}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* Cette semaine */}
      {thisWeek.length > 0 && (
        <div className="bg-indigo-50 border border-indigo-200 rounded-xl p-4">
          <h2 className="text-sm font-semibold text-indigo-800 mb-3">🗓️ Cette semaine ({thisWeek.length})</h2>
          <div className="space-y-2">
            {thisWeek.map(t=>(
              <div key={t.id} onClick={()=>onEditTask(t)}
                className="flex items-center gap-3 cursor-pointer hover:opacity-75 transition-opacity">
                <div className="w-2 h-2 rounded-full flex-shrink-0" style={{backgroundColor:evtColor(t.evenementId)}} />
                <span className="text-sm text-gray-800 flex-1 truncate">{t.titre}</span>
                <Badge cat={t.categorie} />
                <span className="text-xs text-indigo-700 font-medium whitespace-nowrap">{fmtDate(t.dateLimite)}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Event progress */}
      <div className="bg-white rounded-xl border border-gray-200 p-5">
        <h2 className="text-sm font-semibold text-gray-700 mb-4">Progression par événement</h2>
        <div className="space-y-4">
          {eventStats.map(evt => {
            const pct = evt.budgetHeures > 0 ? (evt.heuresReelles/evt.budgetHeures)*100 : 0;
            return (
              <div key={evt.id}>
                <div className="flex items-center justify-between mb-1.5 gap-2 flex-wrap">
                  <div className="flex items-center gap-2 min-w-0">
                    <div className="w-3 h-3 rounded-full flex-shrink-0" style={{backgroundColor:evt.color}} />
                    <span className="text-sm font-medium text-gray-800 truncate">{evt.label}</span>
                    <span className="text-xs text-gray-400 flex-shrink-0">({evt.total})</span>
                  </div>
                  <div className="flex items-center gap-3 flex-shrink-0">
                    <span className="text-xs text-gray-500">{evt.heuresReelles}h / {evt.budgetHeures}h</span>
                    {pct >= 100 && <span className="text-xs text-red-600 font-medium">⚠ Dépassé</span>}
                    {pct >= 80 && pct < 100 && <span className="text-xs text-orange-600 font-medium">⚠ Proche</span>}
                  </div>
                </div>
                <Bar value={evt.heuresReelles} max={evt.budgetHeures} color={evt.color} />
                <div className="flex gap-3 mt-1">
                  <span className="text-xs text-gray-400">À faire: {evt.todo}</span>
                  <span className="text-xs text-blue-500">En cours: {evt.en_cours}</span>
                  <span className="text-xs text-green-500">Terminé: {evt.termine}</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="flex gap-3 flex-wrap">
        <select value={fEvt} onChange={e=>setFEvt(e.target.value)}
          className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white">
          <option value="all">Tous les événements</option>
          {active.map(e=><option key={e.id} value={e.id}>{e.label}</option>)}
        </select>
        <select value={fCat} onChange={e=>setFCat(e.target.value)}
          className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white">
          <option value="all">Toutes les catégories</option>
          {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}

      </div>

      {upcoming.length > 0 && (
        <div className="bg-amber-50 border border-amber-200 rounded-xl p-4">
          <h2 className="text-sm font-semibold text-amber-800 mb-3">📅 Échéances proches</h2>
          <div className="space-y-2">
            {upcoming.map(t=>(
              <div key={t.id} onClick={()=>onEditTask(t)}
                className="flex items-center gap-3 cursor-pointer hover:opacity-75 transition-opacity">
                <div className="w-2 h-2 rounded-full flex-shrink-0" style={{backgroundColor:evtColor(t.evenementId)}} />
                <span className="text-sm text-gray-800 flex-1 truncate">{t.titre}</span>
                <Badge cat={t.categorie} />
                <span className="text-xs text-amber-700 font-medium whitespace-nowrap">{fmtDate(t.dateLimite)}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {enCours.length > 0 && (
        <div>
          <h2 className="text-sm font-semibold text-gray-700 mb-3">En cours ({enCours.length})</h2>
          <div className="space-y-2">
            {enCours.map(t=>(
              <div key={t.id} onClick={()=>onEditTask(t)}
                className="bg-white border border-blue-200 rounded-lg px-4 py-3 flex items-center gap-3 cursor-pointer hover:shadow-sm transition-shadow">
                <PriDot p={t.priorite} />
                <span className="flex-1 text-sm text-gray-800 truncate">{t.titre}</span>
                <TaskTags tags={t.tags} />
                <Badge cat={t.categorie} />
                <span className="text-xs px-2 py-0.5 rounded-full text-white font-medium flex-shrink-0"
                  style={{backgroundColor:evtColor(t.evenementId)}}>{evtShort(t.evenementId)}</span>
                <span className="text-xs text-gray-400 flex-shrink-0">{t.heuresEstimees}h</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div>
        <h2 className="text-sm font-semibold text-gray-700 mb-3">À faire ({todos.length})</h2>
        <div className="space-y-2">
          {todos.slice(0,12).map(t=>(
            <div key={t.id} onClick={()=>onEditTask(t)}
              className="bg-white border border-gray-200 rounded-lg px-4 py-3 flex items-center gap-3 cursor-pointer hover:shadow-sm hover:border-gray-300 transition-shadow">
              <PriDot p={t.priorite} />
              <span className="flex-1 text-sm text-gray-800 truncate">{t.titre}</span>
              <TaskTags tags={t.tags} />
              <Badge cat={t.categorie} />
              <span className="text-xs px-2 py-0.5 rounded-full text-white font-medium flex-shrink-0"
                style={{backgroundColor:evtColor(t.evenementId)}}>{evtShort(t.evenementId)}</span>
              <span className="text-xs text-gray-400 flex-shrink-0">{t.heuresEstimees}h</span>
            </div>
          ))}
        </div>
        {todos.length > 12 && (
          <p className="text-xs text-gray-400 text-center mt-3">
            +{todos.length-12} tâches supplémentaires — voir la vue Kanban
          </p>
        )}
      </div>
    </div>
  );
}

// ── KANBAN VIEW ────────────────────────────────────────────────────────────

function KanbanCard({ task, isDragging, onDragStart, onDragEnd, onEdit, onQuickEdit }) {
  const sub = task.sousTaches || [];
  const subDone = sub.filter(s=>s.fait).length;
  const [editingTitle, setEditingTitle] = useState(false);
  const [draft, setDraft] = useState(task.titre);
  function commit() { setEditingTitle(false); if (draft.trim() && draft !== task.titre) onQuickEdit({...task, titre:draft.trim()}); }
  return (
    <div draggable={!editingTitle}
      onDragStart={e=>onDragStart(e,task.id)}
      onDragEnd={onDragEnd}
      onClick={()=>{ if(!editingTitle) onEdit(); }}
      className={`bg-white rounded-lg p-3 shadow-sm border border-gray-200 cursor-pointer hover:shadow-md transition-all select-none ${isDragging?'opacity-30':''}`}>
      <div className="flex items-start justify-between gap-2 mb-2">
        {editingTitle ? (
          <input autoFocus value={draft} onClick={e=>e.stopPropagation()}
            onChange={e=>setDraft(e.target.value)} onBlur={commit}
            onKeyDown={e=>{ if(e.key==='Enter'){e.preventDefault();commit();} if(e.key==='Escape'){setEditingTitle(false);setDraft(task.titre);} }}
            className="text-sm font-medium border border-gray-300 rounded px-1 py-0.5 w-full focus:outline-none focus:ring-1 focus:ring-gray-400" />
        ) : (
          <span className="text-sm font-medium text-gray-800 leading-snug"
            onDoubleClick={e=>{ e.stopPropagation(); setDraft(task.titre); setEditingTitle(true); }}>
            {task.titre}
          </span>
        )}
        <PriDot p={task.priorite} />
      </div>
      <div className="flex items-center gap-1.5 flex-wrap">
        <Badge cat={task.categorie} />
        {sub.length>0 && <span className="text-xs text-gray-500">{subDone}/{sub.length} ✓</span>}
        <span className="text-xs text-gray-400 ml-auto">{task.heuresEstimees}h</span>
      </div>
      <TaskTags tags={task.tags} />
      {task.dateLimite && (
        <p className="mt-2 text-xs text-orange-600 font-medium">📅 {fmtDate(task.dateLimite)}</p>
      )}
      {task.statut==='termine' && task.heuresReelles != null && (
        <p className="mt-1 text-xs text-green-600">✓ {task.heuresReelles}h réelles</p>
      )}
    </div>
  );
}

function KanbanView({ evenements, taches, onUpdateTask, onAddTask, onEditTask, colLabels }) {
  const active = evenements.filter(e=>e.actif).sort((a,b)=>(a.ordre??0)-(b.ordre??0));
  const [selEvt, setSelEvt] = useState(active[0]?.id||'');
  const [dragging, setDragging] = useState(null);
  const [overCol, setOverCol] = useState(null);

  const cols = useMemo(() => {
    const et = taches.filter(t=>t.evenementId===selEvt);
    return {
      todo:     et.filter(t=>t.statut==='todo'),
      en_cours: et.filter(t=>t.statut==='en_cours'),
      termine:  et.filter(t=>t.statut==='termine'),
    };
  }, [taches, selEvt]);

  function onDragStart(e, id) { setDragging(id); e.dataTransfer.effectAllowed = 'move'; }
  function onDragOver(e, col) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; setOverCol(col); }
  function onDrop(e, newStatut) {
    e.preventDefault();
    if (dragging) {
      const task = taches.find(t=>t.id===dragging);
      if (task && task.statut !== newStatut) {
        if (newStatut==='termine' && task.heuresReelles==null) onEditTask({...task, statut:'termine'});
        else onUpdateTask({...task, statut:newStatut});
      }
    }
    setDragging(null); setOverCol(null);
  }

  const colDefs = [
    { id:'todo',     bg:'bg-gray-100',  hdr:'text-gray-700' },
    { id:'en_cours', bg:'bg-blue-50',   hdr:'text-blue-700' },
    { id:'termine',  bg:'bg-green-50',  hdr:'text-green-700' },
  ];

  return (
    <div className="p-6 flex flex-col h-full">
      <div className="flex items-center gap-4 mb-6 flex-wrap">
        <h1 className="text-2xl font-bold text-gray-900">Kanban</h1>
        <div className="flex gap-2 flex-wrap">
          {active.map(e=>(
            <button key={e.id} onClick={()=>setSelEvt(e.id)}
              className={`px-3 py-1.5 rounded-full text-sm font-medium transition-colors ${selEvt===e.id?'text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
              style={selEvt===e.id?{backgroundColor:e.color}:{}}>
              {e.label}
            </button>
          ))}
        </div>
      </div>

      <div className="flex gap-4 flex-1 overflow-hidden min-h-0">
        {colDefs.map(col=>(
          <div key={col.id}
            className={`flex-1 flex flex-col rounded-xl ${col.bg} min-w-0 transition-all ${overCol===col.id?'ring-2 ring-blue-400':''}`}
            onDragOver={e=>onDragOver(e,col.id)}
            onDrop={e=>onDrop(e,col.id)}
            onDragLeave={()=>setOverCol(null)}>
            <div className={`flex items-center justify-between px-4 py-3 flex-shrink-0 ${col.hdr}`}>
              <span className="font-semibold text-sm">{colLabels[col.id] || DEFAULT_COL_LABELS[col.id]}</span>
              <span className="text-xs bg-white/60 rounded-full px-2 py-0.5">{cols[col.id].length}</span>
            </div>
            <div className="flex-1 overflow-y-auto p-3 space-y-2">
              {cols[col.id].map(task=>(
                <KanbanCard key={task.id} task={task}
                  isDragging={dragging===task.id}
                  onDragStart={onDragStart}
                  onDragEnd={()=>{setDragging(null);setOverCol(null);}}
                  onEdit={()=>onEditTask(task)}
                  onQuickEdit={onUpdateTask} />
              ))}
              {col.id !== 'termine' && (
                <button onClick={()=>onAddTask({evenementId:selEvt, statut:col.id})}
                  className="w-full text-left px-3 py-2 text-xs text-gray-400 hover:text-gray-600 hover:bg-white/60 rounded-lg transition-colors border border-dashed border-gray-300">
                  + Ajouter une tâche
                </button>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function HourTrackingView({ evenements, taches, onUpdateEvenement }) {
  const [expanded, setExpanded] = useState({});
  const [editing, setEditing]   = useState({});

  const active = evenements.filter(e=>e.actif).sort((a,b)=>(a.ordre??0)-(b.ordre??0));

  const rows = useMemo(() => active.map(evt => {
    const et = taches.filter(t=>t.evenementId===evt.id);
    const heuresReelles   = et.filter(t=>t.statut==='termine').reduce((s,t)=>s+(t.heuresReelles||0),0);
    const heuresEstimees  = et.reduce((s,t)=>s+(t.heuresEstimees||0),0);
    return { ...evt, heuresReelles, heuresEstimees, ecart:heuresReelles-evt.budgetHeures, taches:et };
  }), [active, taches]);

  const totals = rows.reduce((s,r)=>({
    budget:  s.budget+r.budgetHeures,
    estim:   s.estim+r.heuresEstimees,
    reelles: s.reelles+r.heuresReelles,
  }), {budget:0,estim:0,reelles:0});

  function toggleExp(id) { setExpanded(p=>({...p,[id]:!p[id]})); }
  function startEdit(id, v) { setEditing(p=>({...p,[id]:String(v)})); }
  function saveEdit(evt) {
    const v = parseFloat(editing[evt.id]);
    if (!isNaN(v)) onUpdateEvenement({...evt, budgetHeures:v});
    setEditing(p=>{ const n={...p}; delete n[evt.id]; return n; });
  }

  function exportCSV() {
    const header = 'Événement,Budget (h),Estimé (h),Réel (h),Écart (h)\n';
    const body = rows.map(r=>`"${r.label}",${r.budgetHeures},${r.heuresEstimees},${r.heuresReelles},${r.ecart}`).join('\n');
    const blob = new Blob([header+body], {type:'text/csv;charset=utf-8'});
    const url  = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='survenants-heures.csv'; a.click();
    URL.revokeObjectURL(url);
  }

  const th = "text-xs font-medium text-gray-500 uppercase tracking-wide px-4 py-3";

  return (
    <div className="p-6 space-y-4 max-w-5xl mx-auto">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold text-gray-900">Suivi horaire</h1>
        <button onClick={exportCSV}
          className="flex items-center gap-2 px-3 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 text-gray-600">
          <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
          </svg>
          Exporter CSV
        </button>
      </div>

      <div className="bg-white rounded-xl border border-gray-200 overflow-x-auto">
        <table className="w-full text-sm min-w-[640px]">
          <thead>
            <tr className="border-b border-gray-100 bg-gray-50">
              <th className={`${th} text-left`}>Événement</th>
              <th className={`${th} text-right`}>Budget alloué</th>
              <th className={`${th} text-right`}>Estimé</th>
              <th className={`${th} text-right`}>Réel</th>
              <th className={`${th} text-right`}>Écart</th>
              <th className={`${th} text-left w-36`}>Progression</th>
              <th className="px-4 py-3 w-10" />
            </tr>
          </thead>
          <tbody>
            {rows.map(evt=>(
              <React.Fragment key={evt.id}>
                <tr className="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                  <td className="px-4 py-3">
                    <div className="flex items-center gap-2">
                      <div className="w-3 h-3 rounded-full flex-shrink-0" style={{backgroundColor:evt.color}} />
                      <span className="font-medium text-gray-800">{evt.label}</span>
                    </div>
                  </td>
                  <td className="px-4 py-3 text-right">
                    {editing[evt.id] !== undefined ? (
                      <div className="flex items-center justify-end gap-1">
                        <input type="number" min="0" value={editing[evt.id]}
                          onChange={e=>setEditing(p=>({...p,[evt.id]:e.target.value}))}
                          onBlur={()=>saveEdit(evt)}
                          onKeyDown={e=>{if(e.key==='Enter')saveEdit(evt);if(e.key==='Escape')setEditing(p=>{const n={...p};delete n[evt.id];return n;})}}
                          className="w-16 border border-gray-300 rounded px-2 py-1 text-right text-sm focus:outline-none focus:ring-1 focus:ring-blue-400"
                          autoFocus />
                        <span className="text-gray-400 text-xs">h</span>
                      </div>
                    ) : (
                      <span onClick={()=>startEdit(evt.id, evt.budgetHeures)}
                        className="cursor-pointer font-medium text-gray-700 hover:text-blue-600 transition-colors"
                        title="Cliquer pour modifier">
                        {evt.budgetHeures}h
                      </span>
                    )}
                  </td>
                  <td className="px-4 py-3 text-right text-gray-600">{evt.heuresEstimees}h</td>
                  <td className="px-4 py-3 text-right text-gray-600">{evt.heuresReelles}h</td>
                  <td className="px-4 py-3 text-right">
                    <span className={`font-medium ${evt.ecart>0?'text-red-600':evt.ecart<0?'text-green-600':'text-gray-500'}`}>
                      {evt.ecart>0?'+':''}{evt.ecart}h

                      </svg>

                </tr>
                {expanded[evt.id] && (
                  <tr className="border-b border-gray-100">
                    <td colSpan={7} className="bg-gray-50 px-6 py-3">
                      <div className="space-y-1.5">
                        {evt.taches.length === 0 && <p className="text-xs text-gray-400 italic">Aucune tâche</p>}
                        {evt.taches.map(t=>(
                          <div key={t.id} className="flex items-center gap-3 text-xs">
                            <span className={`w-2 h-2 rounded-full flex-shrink-0 ${t.statut==='termine'?'bg-green-400':t.statut==='en_cours'?'bg-blue-400':'bg-gray-300'}`} />
                            <span className={`flex-1 truncate ${t.statut==='termine'?'line-through text-gray-400':'text-gray-700'}`}>{t.titre}</span>
                            <Badge cat={t.categorie} />
                            <span className="text-gray-400 w-16 text-right flex-shrink-0">{t.heuresEstimees}h est.</span>
                            <span className={`w-16 text-right flex-shrink-0 ${t.heuresReelles!=null?'text-green-600':'text-gray-300'}`}>
                              {t.heuresReelles!=null?`${t.heuresReelles}h réel`:'—'}
                            </span>
                          </div>
                        ))}
                      </div>
                    </td>
                  </tr>
                )}
              </React.Fragment>
            ))}
            <tr className="border-t-2 border-gray-200 bg-gray-50 font-semibold">
              <td className="px-4 py-3 text-gray-800">Total</td>
              <td className="px-4 py-3 text-right text-gray-800">{totals.budget}h</td>
              <td className="px-4 py-3 text-right text-gray-600">{totals.estim}h</td>
              <td className="px-4 py-3 text-right text-gray-600">{totals.reelles}h</td>
              <td className="px-4 py-3 text-right">
                <span className={`font-semibold ${totals.reelles-totals.budget>0?'text-red-600':'text-green-600'}`}>
                  {totals.reelles-totals.budget>0?'+':''}{totals.reelles-totals.budget}h
                </span>
              </td>
              <td className="px-4 py-3" colSpan={2} />
            </tr>
          </tbody>
        </table>
      </div>
      <p className="text-xs text-gray-400 text-center">Cliquez sur le budget pour le modifier inline. ▼ pour voir le détail des tâches.</p>
    </div>
  );
}

// ── SETTINGS VIEW ────────────────────────────────────────────────────────────

function SettingsView({ evenements, taches, colLabels, onSetColLabels, onImport }) {
  const fileRef = useRef(null);
  const [msg, setMsg] = useState(null);

  function exportJSON() {
    const data = { evenements, taches, exportedAt:new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='survenants-backup.json'; a.click();
    URL.revokeObjectURL(url);
  }

  function importJSON(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.evenements || !data.taches) throw new Error('Format invalide');
        onImport(data.evenements, data.taches);
        setMsg({ ok:true, text:`Importé : ${data.evenements.length} événements, ${data.taches.length} tâches.` });
      } catch (err) {
        setMsg({ ok:false, text:'Erreur : ' + err.message });
      }
      if (fileRef.current) fileRef.current.value = '';
    };
    reader.readAsText(file);
  }

  return (
    <div className="p-6 space-y-6 max-w-3xl mx-auto">
      <h1 className="text-2xl font-bold text-gray-900">Paramètres</h1>

      <div className="bg-white rounded-xl border border-gray-200 p-5 space-y-3">
        <h2 className="text-sm font-semibold text-gray-700">Sauvegarde et restauration</h2>
        <p className="text-xs text-gray-500">Exportez vos données en JSON ou restaurez une sauvegarde précédente.</p>
        <div className="flex gap-3 flex-wrap">
          <button onClick={exportJSON}
            className="px-4 py-2 text-sm bg-gray-900 text-white rounded-lg hover:bg-gray-700">⬇ Exporter JSON</button>
          <button onClick={()=>fileRef.current?.click()}
            className="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 text-gray-700">⬆ Importer JSON</button>
          <input ref={fileRef} type="file" accept="application/json" onChange={importJSON} className="hidden" />
        </div>
        {msg && (
          <p className={`text-xs ${msg.ok?'text-green-600':'text-red-600'}`}>{msg.text}</p>
        )}
      </div>

      <div className="bg-white rounded-xl border border-gray-200 p-5 space-y-3">
        <h2 className="text-sm font-semibold text-gray-700">Libellés des colonnes Kanban</h2>
        <div className="grid grid-cols-3 gap-3">
          {['todo','en_cours','termine'].map(k=>(
            <div key={k}>
              <label className="block text-xs font-medium text-gray-600 mb-1">{DEFAULT_COL_LABELS[k]}</label>
              <input type="text" value={colLabels[k] ?? DEFAULT_COL_LABELS[k]}
                onChange={e=>onSetColLabels({...colLabels, [k]:e.target.value})}
                className="w-full border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400" />
            </div>
          ))}
        </div>
        <button onClick={()=>onSetColLabels({...DEFAULT_COL_LABELS})}
          className="text-xs text-gray-400 hover:text-gray-700">Réinitialiser les libellés</button>
      </div>
    </div>
  );
}

// ── DATA MIGRATION ─────────────────────────────────────────────────────────

function normalizeEvenements(list) {
  const seedMap = {}; SEED_EVENEMENTS.forEach(e=>{ seedMap[e.id]=e; });
  return list.map((e,i) => {
    const seed = seedMap[e.id] || {};
    return {
      ...e,
      lieu:           e.lieu           ?? seed.lieu ?? '',
      description:    e.description    ?? seed.description ?? '',
      notes:          e.notes          ?? seed.notes ?? '',
      statutProjet:   e.statutProjet   ?? seed.statutProjet ?? 'planification',
      responsables:   e.responsables   ?? seed.responsables ?? [],
      datesEvenement: e.datesEvenement ?? seed.datesEvenement ?? [],
      ordre:          e.ordre ?? seed.ordre ?? i,
    };
  });
}

function normalizeTaches(list) {
  return list.map(t => ({ ...t, tags: t.tags ?? [], sousTaches: t.sousTaches ?? [] }));
}

function App() {
  const [evenements, setEvenements] = useLS('survenants_evenements', null);
  const [taches,     setTaches]     = useLS('survenants_taches',     null);
  const [settings,   setSettings]   = useLS('survenants_settings',   { colLabels:{...DEFAULT_COL_LABELS}, dark:false });
  const [view,  setView]  = useState('dashboard');
  const [activeEventId, setActiveEventId] = useState(null);
  const [modal, setModal] = useState(null);
  const [editTask,    setEditTask]    = useState(null);
  const [taskDefaults,setTaskDefaults]= useState({});
  const [resetWarn,   setResetWarn]   = useState(false);
  const migrated = useRef(false);

  // Seed + migrate on first launch
  useEffect(() => {
    if (!evenements) { setEvenements(SEED_EVENEMENTS); }
    else if (!migrated.current) { setEvenements(normalizeEvenements(evenements)); }
    if (!taches) { setTaches(generateSeedTaches()); }
    else if (!migrated.current) { setTaches(normalizeTaches(taches)); }
    migrated.current = true;
  }, []);

  // Dark mode body class
  useEffect(() => {
    document.body.classList.toggle('dark', !!settings.dark);
  }, [settings.dark]);

  if (!evenements || !taches) {
    return <div className="flex h-screen items-center justify-center text-gray-400 text-sm">Chargement…</div>;
  }

  const colLabels = settings.colLabels || DEFAULT_COL_LABELS;

  function openAdd(defaults={}) { setEditTask(null); setTaskDefaults(defaults); setModal('task'); }
  function openEdit(task) { setEditTask(task); setTaskDefaults({}); setModal('task'); }
  function closeTask() { setModal(null); setEditTask(null); setTaskDefaults({}); }

  function saveTask(t) {
    setTaches(p => {
      const idx = p.findIndex(x=>x.id===t.id);
      return idx>=0 ? p.map(x=>x.id===t.id?t:x) : [...p,t];
    });
    closeTask();
  }
  function deleteTask(id) { setTaches(p=>p.filter(t=>t.id!==id)); closeTask(); }
  function updateTask(t) { setTaches(p=>p.map(x=>x.id===t.id?t:x)); }
  function duplicateTask(task) {
    const copy = { ...task, id:uid(), titre:'Copie — '+task.titre, statut:'todo',
      heuresReelles:undefined, dateValidation:undefined, createdAt:new Date().toISOString() };

              <p className="text-xs text-gray-400 mb-2">Réinitialiser toutes les données ?</p>
              <div className="flex gap-2">
                <button onClick={reset} className="text-xs px-2.5 py-1 bg-red-600 text-white rounded-lg hover:bg-red-700">Oui</button>
                <button onClick={()=>setResetWarn(false)} className="text-xs px-2.5 py-1 bg-gray-700 text-gray-300 rounded-lg hover:bg-gray-600">Non</button>
              </div>
            </div>
          ) : (
            <button onClick={()=>setResetWarn(true)} className="w-full text-left px-3 py-2 text-xs text-gray-600 hover:text-gray-400 transition-colors">
              ↺ Réinitialiser les données
            </button>
          )}
        </div>
      </aside>

      {/* Main */}
      <main className="flex-1 overflow-y-auto">
        {view==='dashboard' && (
          <DashboardView evenements={evenements} taches={taches}
            onEditTask={openEdit} onAddTask={openAdd}
            onManageEvents={()=>setModal('events')} />
        )}
        {view==='kanban' && (
          <KanbanView evenements={evenements} taches={taches}
            onUpdateTask={updateTask} onAddTask={openAdd} onEditTask={openEdit} colLabels={colLabels} />
        )}
        {view==='heures' && (
          <HourTrackingView evenements={evenements} taches={taches} onUpdateEvenement={updateEvt} />
        )}
        {view==='evenement' && activeEvent && (
          <EventSheet evenement={activeEvent} taches={taches}
            onUpdateEvent={updateEvt} onEditTask={openEdit} onAddTask={openAdd} />
        )}
        {view==='parametres' && (
          <SettingsView evenements={evenements} taches={taches} colLabels={colLabels}
            onSetColLabels={setColLabels} onImport={doImport} />
        )}
      </main>

      {/* FAB */}
      <button onClick={()=>openAdd()}
        className="fixed bottom-6 right-6 w-12 h-12 bg-gray-900 text-white rounded-full shadow-lg hover:bg-gray-700 flex items-center justify-center transition-colors z-40"
        title="Ajouter une tâche">
        <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/>
        </svg>
      </button>

      {/* Task modal */}
      <Modal open={modal==='task'} onClose={closeTask}
        title={editTask ? 'Modifier la tâche' : 'Nouvelle tâche'} size="lg">
        <TaskForm
          task={editTask}
          defaults={taskDefaults}
          evenements={evenements}
          onSave={saveTask}
          onDelete={editTask ? ()=>deleteTask(editTask.id) : undefined}
          onDuplicate={editTask ? ()=>duplicateTask(editTask) : undefined}
          onClose={closeTask} />
      </Modal>

      {/* Events modal */}
      <Modal open={modal==='events'} onClose={()=>setModal(null)}
        title="Gérer les événements" size="md">
        <EventManager evenements={evenements} onSave={saveEvents} onClose={()=>setModal(null)} />
      </Modal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
